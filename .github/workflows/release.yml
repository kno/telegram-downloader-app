name: Build & Release

on:
  push:
    branches: [main]

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Bump version, commit, tag, push
  # ──────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          chmod +x scripts/version.sh
          VERSION=$(bash scripts/version.sh)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $VERSION"

      - name: Commit & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main --tags

  # ──────────────────────────────────────────────
  # Job 2: Build Android APK
  # ──────────────────────────────────────────────
  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Job 3: Build Windows
  # ──────────────────────────────────────────────
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip release bundle
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "telegram-downloader-windows.zip"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: telegram-downloader-windows.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Job 4: Build Linux
  # ──────────────────────────────────────────────
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Zip release bundle
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/telegram-downloader-linux.zip" .

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: telegram-downloader-linux.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Job 5: Build macOS
  # ──────────────────────────────────────────────
  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip release bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/telegram-downloader-macos.zip" "telegram_downloader.app"

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: telegram-downloader-macos.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Job 6: Create GitHub Release
  # ──────────────────────────────────────────────
  release:
    needs: [version, build-android, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mv artifacts/android-apk/app-release.apk \
             "artifacts/telegram-downloader-android-v${VERSION}.apk"
          mv artifacts/windows-zip/telegram-downloader-windows.zip \
             "artifacts/telegram-downloader-windows-v${VERSION}.zip"
          mv artifacts/linux-zip/telegram-downloader-linux.zip \
             "artifacts/telegram-downloader-linux-v${VERSION}.zip"
          mv artifacts/macos-zip/telegram-downloader-macos.zip \
             "artifacts/telegram-downloader-macos-v${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/telegram-downloader-android-v${{ needs.version.outputs.version }}.apk
            artifacts/telegram-downloader-windows-v${{ needs.version.outputs.version }}.zip
            artifacts/telegram-downloader-linux-v${{ needs.version.outputs.version }}.zip
            artifacts/telegram-downloader-macos-v${{ needs.version.outputs.version }}.zip
