name: telegram_downloader
description: Telegram Downloader - Cross-platform app for managing Telegram downloads
publish_to: 'none'
version: 1.0.8+9

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  google_fonts: ^6.1.0
  libtdjson: ^0.2.2
  path_provider: ^2.1.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  macos:
    generate: true
  windows:
    generate: true
  linux:
    generate: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#229ED9"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
